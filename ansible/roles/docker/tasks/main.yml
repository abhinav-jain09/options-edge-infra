---
- name: Check whether Docker is installed
  ansible.builtin.command: command -v docker
  register: docker_command
  changed_when: false
  failed_when: false

- name: Check current Docker data-root when Docker is installed
  ansible.builtin.command: docker info --format '{{ "{{" }}.DockerRootDir{{ "}}" }}'
  register: current_docker_root
  changed_when: false
  failed_when: false
  when: docker_command.rc == 0

- name: Stop when existing Docker data-root is not under /home/options-edge and migration is not approved
  ansible.builtin.fail:
    msg: >-
      Existing Docker data-root is {{ current_docker_root.stdout | default('unknown') }}.
      Expected {{ docker_data_root }}. Refusing to change Docker data-root without
      docker_configure_data_root=true because this can hide existing containers.
  when:
    - docker_command.rc == 0
    - current_docker_root.stdout is defined
    - current_docker_root.stdout != docker_data_root
    - not (docker_configure_data_root | bool)

- name: Install Docker package when Docker command is missing
  ansible.builtin.package:
    name: docker
    state: present
  ignore_errors: true
  when: docker_command.rc != 0

- name: Ensure Docker config directory exists
  ansible.builtin.file:
    path: /etc/docker
    state: directory
    mode: '0755'

- name: Ensure Docker data-root directory exists
  ansible.builtin.file:
    path: "{{ docker_data_root }}"
    state: directory
    owner: root
    group: root
    mode: '0711'

- name: Configure Docker data-root under /home/options-edge
  ansible.builtin.copy:
    dest: /etc/docker/daemon.json
    mode: '0644'
    content: |
      {
        "data-root": "{{ docker_data_root }}",
        "log-driver": "json-file",
        "log-opts": {
          "max-size": "100m",
          "max-file": "5"
        }
      }
  notify: Restart docker
  when: docker_command.rc != 0 or (docker_configure_data_root | bool)

- name: Enable and start Docker
  ansible.builtin.service:
    name: docker
    enabled: true
    state: started

- name: Verify Docker command exists
  ansible.builtin.command: docker --version
  changed_when: false

- name: Verify Docker data-root is under /home/options-edge
  ansible.builtin.command: docker info --format '{{ "{{" }}.DockerRootDir{{ "}}" }}'
  register: docker_root
  changed_when: false
  failed_when: docker_root.stdout != docker_data_root
